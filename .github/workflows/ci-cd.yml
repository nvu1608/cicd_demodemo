name: C++ CI/CD Pipeline (New Structure)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clone Repository
      uses: actions/checkout@v3

    - name: 🛠️ Configure CMake
      run: cmake -B build -S .

    - name: 🏗️ Build Project
      run: cmake --build build

    - name: ✅ Run Unit Tests
      run: ./build/run_tests

    - name: 📦 Upload App Binary
      uses: actions/upload-artifact@v4
      with:
        name: math-app
        path: build/app

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Download artifact từ CI
        uses: actions/download-artifact@v4
        with:
          name: math-app

      - name: 🚀 Deploy (giả lập)
        run: |
          echo "Đang triển khai ứng dụng lên server sản xuất..."
          chmod +x app
          ./app
          echo "Ứng dụng đã được deploy và chạy thử thành công! ✅"
